name: sync-nixpkgs

# Weekly update for the nixpkgs flake input. Opens a PR only when
# flake.lock changes. Manual runs can be used to refresh on demand.
#
# Note: PRs created with the default GITHUB_TOKEN do NOT trigger other
# workflows (CI, release, etc.). To get full CI on the bump PR, store a
# fine-grained PAT with `pull-requests: write` + `contents: write` as a
# repo secret named SYNC_PR_TOKEN; the workflow will pick it up below.

on:
  schedule:
    - cron: '23 4 * * 1'  # Mondays at 04:23 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-nixpkgs
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v18

      - name: Update nixpkgs input
        run: nix flake update nixpkgs

      - name: Open PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.SYNC_PR_TOKEN || github.token }}
          branch: chore/nixpkgs
          delete-branch: true
          commit-message: 'chore(deps): bump nixpkgs'
          title: 'chore(deps): bump nixpkgs'
          body: |
            Auto-generated by `.github/workflows/sync-nixpkgs.yml`.

            Updated files:
            - `flake.lock`
          labels: |
            dependencies
            automated
