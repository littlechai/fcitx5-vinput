name: sync-sherpa-onnx

# Daily check for new k2-fsa/sherpa-onnx releases. When upstream is newer
# than the pinned default in scripts/sherpa-onnx-vars.sh, run the bump
# script and open a PR. Manual runs accept an explicit version override.
#
# Note: PRs created with the default GITHUB_TOKEN do NOT trigger other
# workflows (CI, release, etc.). To get full CI on the bump PR, store a
# fine-grained PAT with `pull-requests: write` + `contents: write` as a
# repo secret named SYNC_PR_TOKEN; the workflow will pick it up below.

on:
  schedule:
    - cron: '17 3 * * *'  # 03:17 UTC, off the :00/:30 storm
  workflow_dispatch:
    inputs:
      version:
        description: 'Override target sherpa-onnx version (no leading v). Empty = use upstream latest.'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-sherpa-onnx
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve target version
        id: target
        env:
          GH_TOKEN: ${{ github.token }}
          OVERRIDE: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ -n "${OVERRIDE}" ]]; then
            target="${OVERRIDE}"
          else
            target="$(gh api repos/k2-fsa/sherpa-onnx/releases/latest --jq .tag_name | sed 's/^v//')"
          fi
          # shellcheck source=scripts/sherpa-onnx-vars.sh
          source ./scripts/sherpa-onnx-vars.sh
          current="${SHERPA_ONNX_VERSION}"
          echo "current=${current}" >> "${GITHUB_OUTPUT}"
          echo "target=${target}"   >> "${GITHUB_OUTPUT}"
          if [[ "${current}" == "${target}" ]]; then
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            echo "Already pinned at v${target}, nothing to do." >&2
          fi

      - name: Bump pinned version
        if: steps.target.outputs.skip != 'true'
        run: bash scripts/bump-sherpa-onnx.sh "${{ steps.target.outputs.target }}"

      - name: Install Nix
        if: steps.target.outputs.skip != 'true'
        uses: DeterminateSystems/nix-installer-action@v18

      - name: Update flake.lock sherpa-onnx input
        if: steps.target.outputs.skip != 'true'
        # Best-effort: this only follows whatever revision
        # xifan2333/sherpa-onnx-flake currently points to. If that flake
        # repo has not been bumped yet, flake.lock will not pick up the
        # new upstream version on the NixOS side until it is.
        run: nix flake update sherpa-onnx

      - name: Open PR
        if: steps.target.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.SYNC_PR_TOKEN || github.token }}
          branch: chore/sherpa-onnx-${{ steps.target.outputs.target }}
          delete-branch: true
          commit-message: |
            chore(deps): bump sherpa-onnx to v${{ steps.target.outputs.target }}
          title: 'chore(deps): bump sherpa-onnx to v${{ steps.target.outputs.target }}'
          body: |
            Auto-generated by `.github/workflows/sync-sherpa-onnx.yml`.

            - previous: `v${{ steps.target.outputs.current }}`
            - new:      `v${{ steps.target.outputs.target }}`
            - upstream release: https://github.com/k2-fsa/sherpa-onnx/releases/tag/v${{ steps.target.outputs.target }}

            Updated files:
            - `scripts/sherpa-onnx-vars.sh`
            - `packaging/flatpak/org.fcitx.Fcitx5.Addon.Vinput.yaml`
            - `packaging/flatpak/ci-manifest.yaml`
            - `flake.lock` (best-effort `nix flake update sherpa-onnx`)

            Please review the upstream changelog before merging — sherpa-onnx ABI
            and model-format changes ride along with this bump.

            **NixOS note**: the actual sherpa-onnx version on NixOS is decided by
            [`xifan2333/sherpa-onnx-flake`](https://github.com/xifan2333/sherpa-onnx-flake).
            If `flake.lock` did not pick up `v${{ steps.target.outputs.target }}`, that
            repo needs to be bumped first.
          labels: |
            dependencies
            automated
