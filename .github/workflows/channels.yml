name: channels

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to publish from
        required: true
        default: main
      ppa_revision:
        description: PPA revision suffix, for example 5 -> 1ppa5~noble1
        required: false
        default: "1"
      version:
        description: Package version, for example 1.1.14
        required: true
      platform:
        description: Platform to publish (all, copr, ppa, aur, flatpak)
        required: true
        default: all
        type: choice
        options:
          - all
          - copr
          - ppa
          - aur
          - flatpak

permissions:
  contents: read

concurrency:
  group: channels-${{ inputs.ref }}
  cancel-in-progress: false

jobs:
  source_archive:
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.meta.outputs.package_version }}
      package_release: ${{ steps.meta.outputs.package_release }}
      source_archive: ${{ steps.meta.outputs.source_archive }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - id: meta
        shell: bash
        run: |
          version="${{ inputs.version }}"
          if [[ -z "${version}" ]]; then
            echo "version is required" >&2
            exit 1
          fi

          version_file="$(tr -d '\n' < VERSION)"
          if [[ "${version_file}" != "${version}" ]]; then
            echo "VERSION file is ${version_file}, but channels input is ${version}" >&2
            exit 1
          fi

          echo "package_version=${version}" >> "${GITHUB_OUTPUT}"
          echo "package_release=1" >> "${GITHUB_OUTPUT}"
          echo "source_archive=fcitx5-vinput-${version}.tar.gz" >> "${GITHUB_OUTPUT}"

      - name: Create source archive
        shell: bash
        run: |
          mkdir -p dist
          ./scripts/create-source-archive.sh \
            "dist/${{ steps.meta.outputs.source_archive }}" \
            "${{ steps.meta.outputs.package_version }}" \
            "${GITHUB_WORKSPACE}"

      - uses: actions/upload-artifact@v6
        with:
          name: source-archive
          path: dist/${{ steps.meta.outputs.source_archive }}
          if-no-files-found: error

  copr:
    if: ${{ inputs.platform == 'all' || inputs.platform == 'copr' }}
    needs: source_archive
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/download-artifact@v8
        with:
          name: source-archive
          path: dist

      - name: Install rpmbuild and copr-cli
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm
          pip install copr-cli

      - name: Build SRPM
        shell: bash
        run: |
          version="${{ needs.source_archive.outputs.package_version }}"
          source ./scripts/sherpa-onnx-vars.sh
          mkdir -p "${HOME}/rpmbuild/"{SOURCES,SPECS}
          cp dist/${{ needs.source_archive.outputs.source_archive }} "${HOME}/rpmbuild/SOURCES/"
          curl -fL --retry 3 --retry-delay 2 \
            -o "${HOME}/rpmbuild/SOURCES/${SHERPA_ONNX_ARCHIVE}" \
            "${SHERPA_ONNX_URL}"

          sed \
            -e "s/@VINPUT_VERSION@/${version}/g" \
            -e "s/@SHERPA_ONNX_VERSION@/${SHERPA_ONNX_VERSION}/g" \
            packaging/fedora/fcitx5-vinput.spec \
            > "${HOME}/rpmbuild/SPECS/fcitx5-vinput.spec"

          rpmbuild -bs "${HOME}/rpmbuild/SPECS/fcitx5-vinput.spec" \
            --define "_topdir $HOME/rpmbuild"

      - name: Submit to COPR
        shell: bash
        run: |
          mkdir -p ~/.config
          echo "${{ secrets.COPR_CONFIG }}" > ~/.config/copr

          srpm=$(find ~/rpmbuild/SRPMS -name '*.src.rpm' -print -quit)
          copr-cli build fcitx5-vinput-bin "${srpm}"

  ppa:
    if: ${{ inputs.platform == 'all' || inputs.platform == 'ppa' }}
    needs: source_archive
    runs-on: ubuntu-latest
    env:
      DEBFULLNAME: "xifan233"
      DEBEMAIL: "xifan2333@gmail.com"
      GPG_KEY_ID: "E6D4B5BAE745E1506C9961EC892ED0BBCEA13586"
      PPA_REVISION: ${{ inputs.ppa_revision }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/download-artifact@v8
        with:
          name: source-archive
          path: dist

      - name: Install build tools
        run: |
          ./scripts/ci-install-build-deps.sh ubuntu24.04
          sudo apt-get install -y devscripts debhelper dput gnupg

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          gpg-connect-agent reloadagent /bye

      - name: Build and upload source package
        shell: bash
        run: |
          version="${{ needs.source_archive.outputs.package_version }}"
          ppa_revision="${PPA_REVISION}"
          pkg="fcitx5-vinput_${version}-1ppa${ppa_revision}~noble1"
          runtime_dir="${GITHUB_WORKSPACE}/runtime"
          orig_tar="fcitx5-vinput_${version}.orig.tar.gz"
          orig_runtime_tar="fcitx5-vinput_${version}.orig-runtime.tar.gz"
          launchpad_files_base="https://launchpad.net/~xifan233/+archive/ubuntu/ppa/+files"

          if curl -fsSL -o "${orig_tar}" \
            "${launchpad_files_base}/${orig_tar}" \
            && curl -fsSL -o "${orig_runtime_tar}" \
            "${launchpad_files_base}/${orig_runtime_tar}" \
            && tar -tzf "${orig_runtime_tar}" | grep -q '^runtime/'; then
            tar -xf "${orig_tar}"
          else
            rm -f "${orig_tar}" "${orig_runtime_tar}"
            tar -xf "dist/${{ needs.source_archive.outputs.source_archive }}"
            cp "dist/${{ needs.source_archive.outputs.source_archive }}" \
              "${orig_tar}"

            rm -rf "${runtime_dir}"
            mkdir -p "${runtime_dir}"
            source ./scripts/sherpa-onnx-vars.sh
            bash ./scripts/build-sherpa-onnx.sh \
              "${SHERPA_ONNX_VERSION}" \
              "${runtime_dir}"

            tar -C "${GITHUB_WORKSPACE}" -czf "${orig_runtime_tar}" runtime
          fi

          cd "fcitx5-vinput-${version}"
          cp -r packaging/debian debian
          dch --create --package fcitx5-vinput \
            --newversion "${version}-1ppa${ppa_revision}~noble1" \
            --distribution noble \
            "Release ${version}"

          dpkg-buildpackage -S -sa -d --no-sign

          cd ..
          debsign -k"${GPG_KEY_ID}" \
            -p"gpg --no-tty --pinentry-mode loopback" \
            "${pkg}_source.changes"
          dput ppa:xifan233/ppa "${pkg}_source.changes"

  aur:
    if: ${{ inputs.platform == 'all' || inputs.platform == 'aur' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger AUR publish
        env:
          GH_TOKEN: ${{ secrets.AUR_AUTO_PAT }}
        run: |
          gh workflow run build-and-publish.yml \
            --repo xifan2333/aur-auto \
            --field package=fcitx5-vinput-bin \
            --field force=true

  flatpak:
    if: ${{ inputs.platform == 'all' || inputs.platform == 'flatpak' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Flatpak repository publish
        env:
          GH_TOKEN: ${{ secrets.FLATPAK_AUTO_PAT || secrets.AUR_AUTO_PAT }}
        run: |
          gh workflow run sync-and-publish.yml \
            --repo xifan2333/flatpak-auto \
            --field product=fcitx5-vinput \
            --field version=${{ inputs.version }} \
            --field force=true
